name: Filtered Changes Calibration Report

on:
  workflow_dispatch:       # Manual trigger only — run whenever you want to review
    inputs:
      days:
        description: 'How many days back to look (default: 7)'
        required: false
        default: '7'

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install supabase resend python-dotenv

      - name: Send filtered changes report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          REPORT_DAYS: ${{ github.event.inputs.days }}
        run: python run_filtered_notify.py
